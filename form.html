<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals Eduardo Salazar</title>
    <meta name="description" content="product review form page using good form design given specific field requirements and submission confirmation with a counter">
    <meta name="author" content="Eduardo Svein Salazar">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="wf1">
            <fieldset>
                <label class="title" for="product">
                Product Name*
                    <select name="product" id="product" required>
                        <option value="" disabled selected>Choose a Product... </option>
                    </select>
                </label>
                <label class="title" for="rating">
                    Overall Rating* 
                    <div id="star-rating">
                        <input type="radio" name="stars" id="star-a" value="5" required/>
                        <label for="star-a"></label>
                        <input type="radio" name="stars" id="star-b" value="4" required/>
                        <label for="star-b"></label>
                        <input type="radio" name="stars" id="star-c" value="3" required/>
                        <label for="star-c"></label>
                        <input type="radio" name="stars" id="star-d" value="2" required/>
                        <label for="star-d"></label>
                        <input type="radio" name="stars" id="star-e" value="1" required>
                        <label for="star-e"></label>
                    </div>
                </label>
                <label class="title" for="Installation-date">
                    Date of Installation*
                    <input type="date" id="installed" name="installed" required>
                </label>
                <label class="title" for="features">
                    Which features did you find useful in the product? (Check all that apply)*
                    <label for="check-dura"><input id="check-dura" type="checkbox" name="features" value="durability" required>Durability</label>
                    <label for="check-ease"><input id="check-ease" type="checkbox" name="features" value="ease-of-use" required>Ease of Use</label>
                    <label for="check-perf"><input id="check-perf" type="checkbox" name="features" value="performance" required>Performance</label>
                    <label for="check-design"><input id="check-design" type="checkbox" name="features" value="design" required>Design</label>
                </label>
                <label class="title" for="review-txt">
                    Written Review <small>(optional)</small>
                    <textarea name="written-review" id="written-review"></textarea>
                </label>
                <label class="title" for="username">
                   Your Name <small>(optional)</small>
                    <input type="text" id="username" name="users name">
                </label>
                </fieldset>
            <input type="submit" value="Post Review">
            <small id="symbol">* All inputs with this symbol must be filled before procceding</small>

        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> 🏀 Eduardo Svein Salazar 🏀 Mexico.</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
